<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management System</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
        <div class="container">
            <input type="text" id="ProductName" class="input" placeholder="product name"/>
            <input type="number" value="" min="0" id="productPrice" class="input" placeholder="product price"/>
            <input type="text" id="productCategory" class="input" placeholder="category"/>
            <input type="text" id="productImage" class="input" placeholder="product image url"/>
            <input type="number" value="1" min="1" id="productQuantity" class="input" placeholder="stoke quantity"/>
            <textarea name="" id="productDescription" class="input" placeholder="Description"></textarea>

            <div class="buttons">
            <button class="savebtn" id="saveBtn">Save Product</button>
            <button class="cancelbtn" id="cancelBtn">Cancel</button>
            <button class="back-btn" id="backBtn">← Back</button>
        </div>
        </div>

        <script src="./js/addProducts.js"></script>
</body>
</html>
